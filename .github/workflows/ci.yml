name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "delivery/webapp/**"
      - "delivery/render-worker/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webapp-lint-and-test:
    name: Webapp Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: delivery/webapp

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sow
          POSTGRES_PASSWORD: sow
          POSTGRES_DB: sow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: SOW_DATABASE_URL=postgresql://sow:sow@localhost:5432/sow_test?sslmode=disable pnpm exec drizzle-kit migrate

      - run: SOW_DATABASE_URL=postgresql://sow:sow@localhost:5432/sow_test?sslmode=disable pnpm test:postgres-smoke

  render-worker-test:
    name: Render Worker Test
    runs-on: ubuntu-latest
    env:
      SKIP_DOCKER_TESTS: "1"
    defaults:
      run:
        working-directory: delivery/render-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --no-cache-dir -r requirements.txt pytest pytest-mock pytest-asyncio

      - run: PYTHONPATH=src pytest tests/ -v
