name: Android App Build

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/android-app.yml"
      - "delivery/android/**"
  pull_request:
    paths:
      - ".github/workflows/android-app.yml"
      - "delivery/android/**"

concurrency:
  group: android-app-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: delivery/android
    env:
      ANDROID_API_BASE_URL: ${{ vars.SOW_ANDROID_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Validate API base URL
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_API_BASE_URL:-}" ]; then
            echo "::error::Repository variable SOW_ANDROID_API_BASE_URL is not configured"
            exit 1
          fi

          case "$ANDROID_API_BASE_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::SOW_ANDROID_API_BASE_URL must start with http:// or https://"
              exit 1
              ;;
          esac

      - name: Test, lint, and assemble debug APK
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug -Psow.apiBaseUrl.debug="$ANDROID_API_BASE_URL"

      - name: Prepare debug APK artifact
        run: |
          set -euo pipefail
          mkdir -p ../../dist/android
          cp app/build/outputs/apk/debug/app-debug.apk ../../dist/android/sow-android-debug.apk
          sha256sum ../../dist/android/sow-android-debug.apk > ../../dist/android/sow-android-debug.apk.sha256

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sow-android-debug-apk
          path: |
            dist/android/sow-android-debug.apk
            dist/android/sow-android-debug.apk.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish public debug APK release
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: android-debug-latest
          RELEASE_TITLE: Stream of Worship Android Debug APK
          APK_PATH: ../../dist/android/sow-android-debug.apk
          CHECKSUM_PATH: ../../dist/android/sow-android-debug.apk.sha256
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Automated debug APK from the latest successful Android CI build on \`${{ github.event.repository.default_branch }}\`.

          Commit: \`${{ github.sha }}\`
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Download \`sow-android-debug.apk\` from this release's assets.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --prerelease
            gh release upload "$RELEASE_TAG" "$APK_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$APK_PATH" "$CHECKSUM_PATH" \
              --title "$RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --prerelease \
              --latest=false
          fi

      - name: Summarize APK
        run: |
          {
            echo "## Android debug APK"
            echo ""
            echo "- Artifact: \`sow-android-debug-apk\`"
            echo "- Public release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/android-debug-latest"
            echo "- API base URL: \`$ANDROID_API_BASE_URL\`"
            echo "- Application ID: \`org.streamofworship.android.debug\`"
            echo "- Install note: download the APK from the public release or unzip the workflow artifact, then install it on a device with Android's \"install unknown apps\" permission enabled for the opening app."
          } >> "$GITHUB_STEP_SUMMARY"
