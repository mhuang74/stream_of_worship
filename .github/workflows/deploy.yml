name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "delivery/webapp/**"
      - "delivery/render-worker/**"

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      webapp: ${{ steps.filter.outputs.webapp }}
      render-worker: ${{ steps.filter.outputs.render-worker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: filter
        run: |
          before="${{ github.event.before }}"
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "webapp=true" >> $GITHUB_OUTPUT
            echo "render-worker=true" >> $GITHUB_OUTPUT
          else
            webapp=false
            render_worker=false
            for file in $(git diff --name-only "$before" "${{ github.sha }}"); do
              if [[ "$file" == delivery/webapp/* ]]; then webapp=true; fi
              if [[ "$file" == delivery/render-worker/* ]]; then render_worker=true; fi
            done
            echo "webapp=$webapp" >> $GITHUB_OUTPUT
            echo "render-worker=$render_worker" >> $GITHUB_OUTPUT
          fi

  migrate-db:
    name: Run DB Migrations + Deploy
    needs: detect-changes
    if: needs.detect-changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: migrate-db-${{ github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: delivery/webapp

    steps:
      - uses: actions/checkout@v4

      - name: Get pnpm version
        id: pnpm-version
        run: echo "version=$(node -p "require('./package.json').packageManager.replace('pnpm@','')")" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.pnpm-version.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run DB migrations
        env:
          SOW_DATABASE_URL: ${{ secrets.SOW_DATABASE_URL }}
        run: |
          if [ -z "$SOW_DATABASE_URL" ]; then
            echo "Error: SOW_DATABASE_URL secret is not configured"
            exit 1
          fi
          npx tsx scripts/migrate.ts

      - name: Trigger Vercel deploy
        if: success()
        run: curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"

  deploy-render-worker:
    name: Deploy Render Worker to Lambda
    needs: detect-changes
    if: needs.detect-changes.outputs.render-worker == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-render-worker-${{ github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: delivery/render-worker

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SOW_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SOW_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sow-render-worker
          IMAGE_TAG: ${{ github.sha }}
          FFMPEG_VERSION: "7.0.2"
          R2_BUCKET: ${{ secrets.SOW_R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.SOW_R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.SOW_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.SOW_R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          BUILD_LOG="$(mktemp)"
          # R2 creds must be present in a deployed build; validate before
          # Docker can fall through to the flaky johnvansickle fallback.
          for k in R2_BUCKET R2_ENDPOINT_URL R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY; do
            [ -n "${!k}" ] || { echo "::error::Secret $k is empty; refusing to deploy without R2-sourced FFmpeg."; exit 1; }
          done

          # --progress=plain is load-bearing: BuildKit only streams RUN stdout
          # (our 'Downloaded ffmpeg from R2' marker) in plain mode; the
          # progress-bar mode buffers/discards it, which would break the grep.
          docker build \
            --progress=plain \
            --build-arg FFMPEG_VERSION="$FFMPEG_VERSION" \
            --build-arg R2_BUCKET="$R2_BUCKET" \
            --build-arg R2_ENDPOINT_URL="$R2_ENDPOINT_URL" \
            --build-arg R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            --build-arg R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            --build-arg REQUIRE_R2_FFMPEG=true \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" . 2>&1 | tee "$BUILD_LOG"

          if ! grep -q "Downloaded ffmpeg from R2" "$BUILD_LOG"; then
            echo "::error::FFmpeg was NOT fetched from R2 - build fell back to johnvansickle.com. Aborting deploy to surface the issue (see log for 'R2 download failed:' cause)."
            exit 1
          fi
          echo "Verified: FFmpeg sourced from R2."

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Update Lambda function
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          aws lambda update-function-code \
            --function-name sow-render-worker \
            --image-uri $IMAGE_URI \
            --publish

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name sow-render-worker
